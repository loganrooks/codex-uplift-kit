name: Publish npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish trusted npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure trusted-publishing npm
        run: npm install -g npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Validate release tag and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.RELEASE_TAG || '';
          if (!tag.startsWith('v')) {
            throw new Error(`Release tag must start with "v"; received "${tag}"`);
          }

          const version = tag.slice(1);
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== version) {
            throw new Error(`package.json version ${pkg.version} does not match release tag ${tag}`);
          }

          if (!version.includes('-alpha.')) {
            throw new Error(`Only alpha releases are enabled by this workflow; received ${version}`);
          }
          NODE

      - name: Release checks
        run: npm run release:check

      - name: Publish alpha to npm
        run: npm publish --tag alpha
